apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-web-app
  template:
    metadata:
      labels:
        app: html-web-app
    spec:
      containers:
      - name: html-web-app
        image: thamizhkarthik05/html-app:latest
        ports:
        - containerPort : 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  type: NodePort
  selector:
    app: html-web-app
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30016